name: Daily Release

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      RELEASE_TIMEZONE: Europe/Vienna
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: npm ci

      - name: Decide release
        id: decide
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          latest_tag="$(git tag --sort=-creatordate | head -n 1 || true)"
          if [[ -n "$latest_tag" ]] && git diff --quiet "$latest_tag"..HEAD -- .; then
            current_version="$(npm pkg get version | tr -d '"')"
            if ! gh release view "$latest_tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              {
                echo "should_release=false"
                echo "should_recover_release=true"
                echo "latest_tag=$latest_tag"
                echo "tag=$latest_tag"
                echo "npm_version=$current_version"
              } >> "$GITHUB_OUTPUT"
              echo "${latest_tag} is tagged but its GitHub release is missing; recovering release notes." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            {
              echo "should_release=false"
              echo "should_recover_release=false"
              echo "latest_tag=$latest_tag"
            } >> "$GITHUB_OUTPUT"
            echo "No changes since $latest_tag; skipping release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # A previous run may have merged release metadata but failed before
          # publishing/tagging. Resume that exact package version even after a
          # calendar-day rollover instead of inventing a newer date version.
          current_version="$(npm pkg get version | tr -d '"')"
          if [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9]+)?$ ]]; then
            current_year="${BASH_REMATCH[1]}"
            current_month="${BASH_REMATCH[2]}"
            current_day="${BASH_REMATCH[3]}"
            current_suffix="${BASH_REMATCH[4]}"
            current_tag="v${current_year}.${current_month}.${current_day}${current_suffix}"
            current_padded_tag="$(printf 'v%s.%02d.%02d%s' \
              "$current_year" "$((10#$current_month))" "$((10#$current_day))" "$current_suffix")"
            if ! git show-ref --verify --quiet "refs/tags/${current_tag}" \
              && ! git show-ref --verify --quiet "refs/tags/${current_padded_tag}"; then
              {
                echo "should_release=true"
                echo "should_recover_release=false"
                echo "latest_tag=$latest_tag"
                echo "base_sha=$(git rev-parse HEAD)"
                echo "tag=$current_tag"
                echo "npm_version=$current_version"
              } >> "$GITHUB_OUTPUT"
              echo "Resuming untagged release metadata ${current_tag} already present on main." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          # Unpadded calendar version (YYYY.M.D) to match the @unbrained/pm-cli
          # convention; npm/semver and downstream changelog headings both expect
          # the month/day without a leading zero.
          release_date="$(TZ="$RELEASE_TIMEZONE" date +%Y.%-m.%-d)"
          base_tag="v${release_date}"
          # Legacy zero-padded form of the same calendar date. Tags published
          # before the unpadded convention (e.g. v2026.05.27) must still count
          # toward the same-day suffix, so a corrective release on a date that
          # already shipped a padded tag bumps to -1 instead of colliding with
          # the already-published npm version.
          year="${release_date%%.*}"
          date_tail="${release_date#*.}"
          month="${date_tail%%.*}"
          day="${date_tail#*.}"
          padded_base_tag="$(printf 'v%s.%02d.%02d' "$year" "$((10#$month))" "$((10#$day))")"
          max_suffix=-1
          while IFS= read -r existing_tag; do
            [[ -n "$existing_tag" ]] || continue
            for bt in "$base_tag" "$padded_base_tag"; do
              if [[ "$existing_tag" == "$bt" ]]; then
                (( max_suffix < 0 )) && max_suffix=0
              elif [[ "$existing_tag" == "$bt-"* ]]; then
                suffix="${existing_tag#"$bt-"}"
                if [[ "$suffix" =~ ^[0-9]+$ ]] && (( suffix > max_suffix )); then
                  max_suffix="$suffix"
                fi
              fi
            done
          done < <(git tag -l "${base_tag}*"; git tag -l "${padded_base_tag}*")

          if (( max_suffix >= 0 )); then
            tag="${base_tag}-$((max_suffix + 1))"
          else
            tag="$base_tag"
          fi

          version_core="${tag#v}"
          year="${version_core%%.*}"
          version_tail="${version_core#*.}"
          month="${version_tail%%.*}"
          day_and_suffix="${version_tail#*.}"
          day="${day_and_suffix%%-*}"
          suffix="${day_and_suffix#"$day"}"
          npm_version="$((10#$year)).$((10#$month)).$((10#$day))${suffix}"
          next_values="$(printf 'tag=%s\nnpm_version=%s\n' "$tag" "$npm_version")"

          {
            echo "should_release=true"
            echo "should_recover_release=false"
            echo "latest_tag=$latest_tag"
            echo "base_sha=$(git rev-parse HEAD)"
            echo "$next_values"
          } >> "$GITHUB_OUTPUT"

      - name: Update release version
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ steps.decide.outputs.npm_version }}" --no-git-tag-version --allow-same-version
          npm run build
          node dist/sync-version.js "${{ steps.decide.outputs.npm_version }}"
        env:
          NPM_VERSION: ${{ steps.decide.outputs.npm_version }}

      - name: Run release checks
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run check
          npm test
          npm run audit:prod
          npm run pack:dry-run

      - name: Build and generate changelog
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          node dist/cli.js \
            --pm-root .agents/pm \
            --mode replace \
            --output CHANGELOG.md \
            --all-release-tags \
            --version "${{ steps.decide.outputs.tag }}" \
            --item-url-base https://github.com/unbraind/pm-changelog/blob/main/.agents/pm \
            --pm-bin ./node_modules/.bin/pm \
            --github-step-summary
          node dist/cli.js \
            --pm-root .agents/pm \
            --mode replace \
            --output CHANGELOG.md \
            --all-release-tags \
            --version "${{ steps.decide.outputs.tag }}" \
            --item-url-base https://github.com/unbraind/pm-changelog/blob/main/.agents/pm \
            --pm-bin ./node_modules/.bin/pm \
            --check

      - name: Commit release files
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json manifest.json src/extension.ts dist CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Release files are already current; creating tag without an extra commit."
          else
            git commit -m "Release pm-changelog ${{ steps.decide.outputs.tag }}"
          fi

      # Refuse non-main release runs BEFORE publishing. `github.ref` is the
      # authoritative workflow trigger ref: schedule -> refs/heads/main;
      # workflow_dispatch from main -> refs/heads/main; workflow_dispatch from a
      # feature branch -> refs/heads/<feature> (refused here). Checking the
      # trigger ref (rather than git topology) reliably distinguishes a feature
      # branch from main, which commit-topology checks cannot do (a feature
      # branch off main is also a descendant of origin/main).
      - name: Check release ref
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Refusing to release from non-main ref ('$GITHUB_REF'). Run the release workflow from main."
            exit 1
          fi

      # Persist validated release metadata through the repository's protected
      # branch policy before publishing an immutable npm artifact. A stable
      # branch name lets a failed run update/reuse its open release PR, while
      # the exact remote SHA lease prevents overwriting another actor's work.
      - name: Merge release metadata through protected PR
        if: steps.decide.outputs.should_release == 'true'
        id: release_pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BASE_SHA: ${{ steps.decide.outputs.base_sha }}
          RELEASE_TAG: ${{ steps.decide.outputs.tag }}
          NPM_VERSION: ${{ steps.decide.outputs.npm_version }}
        run: |
          set -euo pipefail
          git fetch origin main --force
          current_main_sha="$(git rev-parse origin/main)"
          if [[ "$current_main_sha" != "$RELEASE_BASE_SHA" ]]; then
            echo "::error::main advanced from ${RELEASE_BASE_SHA} to ${current_main_sha} while preparing the release. Retry from the new main head."
            exit 1
          fi

          release_branch="release/${RELEASE_TAG#v}"
          release_commit="$(git rev-parse HEAD)"
          if [[ "$release_commit" == "$current_main_sha" ]]; then
            echo "Release metadata is already present on main; resuming the publish/tag transaction."
            if git ls-remote --exit-code --heads origin "refs/heads/${release_branch}" > /dev/null 2>&1; then
              git push origin --delete "$release_branch"
            fi
            {
              echo "merged_sha=$current_main_sha"
              echo "pr_number="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          remote_branch_sha="$(git ls-remote --heads origin "refs/heads/${release_branch}" | cut -f1)"
          if [[ -n "$remote_branch_sha" ]]; then
            git push \
              --force-with-lease="refs/heads/${release_branch}:${remote_branch_sha}" \
              origin "HEAD:refs/heads/${release_branch}"
          else
            git push origin "HEAD:refs/heads/${release_branch}"
          fi

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$release_branch" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            pr_url="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$release_branch" \
              --title "Release pm-changelog ${RELEASE_TAG}" \
              --body "Automated daily release metadata for \`${RELEASE_TAG}\`. The release gate passed before this PR was created; npm publication and tagging remain blocked until this protected PR is merged. Tracking: [pmc-84ow](https://github.com/unbraind/pm-changelog/blob/main/.agents/pm/issues/pmc-84ow.toon).")"
            pr_number="${pr_url##*/}"
          fi

          merged_sha="$(gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/merge" \
            -f merge_method=rebase \
            -f sha="$release_commit" \
            --jq '.sha')"
          if [[ -z "$merged_sha" || "$merged_sha" == "null" ]]; then
            echo "::error::GitHub did not return the merged main SHA for release PR #${pr_number}."
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "refs/heads/${release_branch}" > /dev/null 2>&1; then
            git push origin --delete "$release_branch"
          fi
          {
            echo "merged_sha=$merged_sha"
            echo "pr_number=$pr_number"
          } >> "$GITHUB_OUTPUT"
          echo "Merged release metadata PR #${pr_number} at ${merged_sha}." >> "$GITHUB_STEP_SUMMARY"

      # The release PR can only contain the prepared release commit because the
      # base SHA is checked immediately before creation. Re-check the exact
      # merged main commit anyway so npm always receives byte-for-byte validated
      # repository state, and fail safely before publication if main moved.
      - name: Verify merged release
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        env:
          MERGED_SHA: ${{ steps.release_pr.outputs.merged_sha }}
          NPM_VERSION: ${{ steps.decide.outputs.npm_version }}
        run: |
          set -euo pipefail
          git fetch origin main --force
          git checkout --detach origin/main
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$MERGED_SHA" ]]; then
            echo "::error::main advanced from merged release ${MERGED_SHA} to ${actual_sha} before publication. Retry to rebuild release metadata on the new head."
            exit 1
          fi

          actual_version="$(npm pkg get version | tr -d '"')"
          if [[ "$actual_version" != "$NPM_VERSION" ]]; then
            echo "::error::Merged package version ${actual_version} does not match intended release ${NPM_VERSION}."
            exit 1
          fi

          npm ci
          npm run release:check
          git diff --exit-code -- \
            package.json package-lock.json manifest.json src/extension.ts dist CHANGELOG.md

      - name: Publish npm package
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_VERSION: ${{ steps.decide.outputs.npm_version }}
        run: |
          set -euo pipefail
          pkg_name="$(node -p "require('./package.json').name")"
          if npm view "${pkg_name}@${NPM_VERSION}" version --json >/dev/null 2>&1; then
            echo "::notice::${pkg_name}@${NPM_VERSION} already published; skipping publish step."
            exit 0
          fi
          publish_with_provenance() {
            npm publish --access public --provenance --ignore-scripts
          }
          attempt=0
          max_attempts=3
          while (( attempt < max_attempts )); do
            attempt=$(( attempt + 1 ))
            if publish_with_provenance; then
              echo "Published with provenance on attempt ${attempt}."
              exit 0
            fi
            if npm view "${pkg_name}@${NPM_VERSION}" version --json >/dev/null 2>&1; then
              echo "::notice::Version landed despite reported error; treating as success."
              exit 0
            fi
            if (( attempt < max_attempts )); then
              echo "Publish attempt ${attempt}/${max_attempts} failed; sleeping 30s before retry..."
              sleep 30
            fi
          done
          if npm view "${pkg_name}@${NPM_VERSION}" version --json >/dev/null 2>&1; then
            echo "::notice::Version landed after the final reported error; treating as success."
            exit 0
          fi
          echo "::error::Publish with provenance failed after ${max_attempts} attempts. Refusing to downgrade supply-chain attestations; retry the release transaction."
          exit 1

      # Tag the exact merged/verified main commit AFTER a successful publish.
      # If publication fails, main retains the prepared metadata and the next
      # run resumes the same version instead of inventing another release.
      - name: Push release tag
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.decide.outputs.tag }}
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          if git rev-parse --verify --quiet "refs/tags/${release_tag}" > /dev/null; then
            existing_sha="$(git rev-list -n 1 "$release_tag")"
            current_sha="$(git rev-parse HEAD)"
            if [[ "$existing_sha" != "$current_sha" ]]; then
              echo "::error::${release_tag} already points to ${existing_sha}, not verified main ${current_sha}."
              exit 1
            fi
          else
            git tag "$release_tag"
          fi
          git push origin "refs/tags/${release_tag}"

      - name: Verify bun install of published package
        if: steps.decide.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          pkg_name="$(node -p "require('./package.json').name")"
          pkg_version="${{ steps.decide.outputs.npm_version }}"
          mkdir -p /tmp/bun-verify
          cd /tmp/bun-verify
          rm -rf node_modules bun.lockb package.json
          bun init -y > /dev/null
          # Smoke-test that the just-published version installs via bun.
          # Retry to absorb npm registry propagation (~60s typical).
          for attempt in 1 2 3 4 5 6 7 8; do
            if bun add "${pkg_name}@${pkg_version}"; then
              echo "bun add succeeded on attempt $attempt"
              exit 0
            fi
            echo "bun add failed on attempt $attempt, sleeping 30s..."
            sleep 30
          done
          # bun's registry mirror can lag well past npm's own propagation,
          # especially for prerelease (-N) versions. The npm registry is
          # authoritative for what we just published: if it confirms the
          # version, the release genuinely succeeded and the bun failure is
          # mirror lag, not a publish failure. Do not let it block the
          # GitHub release / post-publish steps that follow.
          echo "bun could not resolve ${pkg_name}@${pkg_version}; checking npm registry authoritatively..."
          if npm view "${pkg_name}@${pkg_version}" version --registry="https://registry.npmjs.org" > /dev/null 2>&1; then
            echo "::warning::bun has not mirrored ${pkg_name}@${pkg_version} yet, but npm confirms it is published (registry mirror lag). Treating verification as successful."
            exit 0
          fi
          echo "npm registry does not show ${pkg_name}@${pkg_version} - real publish failure."
          exit 1
      - name: Create GitHub release
        if: steps.decide.outputs.should_release == 'true' || steps.decide.outputs.should_recover_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.decide.outputs.tag }}
          NPM_VERSION: ${{ steps.decide.outputs.npm_version }}
        run: |
          set -euo pipefail
          pkg_name="$(node -p "require('./package.json').name")"
          if ! npm view "${pkg_name}@${NPM_VERSION}" version --json > /dev/null 2>&1; then
            echo "::error::Cannot create ${RELEASE_TAG}: npm does not contain ${pkg_name}@${NPM_VERSION}."
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "::notice::GitHub release ${RELEASE_TAG} already exists; nothing to recover."
            exit 0
          fi
          escaped_tag="$(printf '%s\n' "${RELEASE_TAG#v}" | sed 's/[][\\.^$*+?(){}|]/\\&/g')"
          tag_pattern="^## v?${escaped_tag}( |$)"
          node dist/cli.js \
            --pm-root .agents/pm \
            --stdout \
            --all-release-tags \
            --release-version-from-package \
            --item-url-base https://github.com/unbraind/pm-changelog/blob/main/.agents/pm \
            --pm-bin ./node_modules/.bin/pm \
            | awk -v pat="$tag_pattern" '/^## /{p=0} $0 ~ pat {p=1} p' \
            > RELEASE_NOTES.md
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "pm-changelog $RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
